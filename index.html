<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth PWA</title>

  <link rel="manifest" href="manifest.json" />

  <style>
    :root {
      --bg: #0b0b0b;
      --card: #1a1a1a;
      --text: #fff;
      --sub: #aaa;
      --accent: #4caf50;
    }

    body {
      margin: 0;
      font-family: system-ui;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 16px;
    }

    input,
    button,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: var(--accent);
      color: white;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
    }

    .name {
      font-size: 14px;
      color: var(--sub);
    }

    .code {
      font-size: 36px;
      letter-spacing: 4px;
      font-weight: bold;
      cursor: pointer;
    }

    .bar {
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: var(--accent);
    }

    .row {
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: none;
      color: #ff6666;
      border: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Authenticator</h2>

    <input id="name" placeholder="アカウント名" />
    <input id="issuer" placeholder="Issuer（任意）" />
    <input id="secret" placeholder="Base32 Secret" />
    <button onclick="addAccount()">追加</button>

    <button onclick="exportData()">バックアップ</button>
    <button onclick="importData()">復元</button>

    <textarea id="backup" placeholder="バックアップデータ"></textarea>

    <div id="list"></div>
  </div>

  <!-- OTPAuth -->
  <script src="https://cdn.jsdelivr.net/npm/otpauth@9.0.2/dist/otpauth.umd.min.js"></script>

  <script src="db.js"></script>
  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>

</html>
